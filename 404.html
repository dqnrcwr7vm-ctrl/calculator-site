<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없어요 - 생활 계산기 모음</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --ink: #1f2a24;
    --paper: #fbfaf7;
    --line: #d9d4c8;
    --accent: #1e6b50;
    --accent-soft: #e8f1ec;
    --muted: #6b6f68;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .box { max-width: 480px; text-align: center; }
  .code {
    font-size: 64px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  h1 { font-size: 22px; margin-top: 14px; letter-spacing: -0.01em; }
  p { color: var(--muted); font-size: 15px; margin-top: 10px; }
  .links { margin-top: 26px; display: grid; gap: 10px; }
  .links a {
    display: block;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 13px 16px;
    text-decoration: none;
    color: var(--ink);
    font-weight: 700;
    font-size: 15px;
    transition: border-color .15s, background .15s;
  }
  .links a:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .links a.main { background: var(--accent); border-color: var(--accent); color: #fff; }
  .links a.main:hover { background: #16573f; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>이 주소에는 페이지가 없어요</h1>
    <p>주소가 바뀌었거나 잘못 입력된 것 같습니다.<br>찾으시던 게 혹시 이 중에 있을까요?</p>
    <div class="links">
      <a class="main" href="/">🏠 모든 계산기 보기</a>
      <a href="/property-tax.html">주택 재산세 계산기</a>
      <a href="/severance.html">퇴직금 계산기</a>
      <a href="/blog.html">세금·생활비 가이드</a>
    </div>
  </div>
</body>
</html>
